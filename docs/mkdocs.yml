site_name: Kayori v2
site_description: Async, adapter-based AI companion built around LangGraph
docs_dir: .
site_dir: ../site

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Nunito
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: custom

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Scheduler: scheduler.md
  - MoodEngine: mood-engine.md
  - Orchestrator: orchestrator.md
  - Episodic Memory: episodic-memory.md
  - Conversation Contraction: conversation-contraction.md
  - Output Sink: output-sink.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
